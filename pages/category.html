  <!-- JavaScript -->
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/language-selector.js"></script>

  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../shared/ui.js"></script>
  
  <script>
    // Page-specific script
    (async function() {
      await App.init();
      
      // Get category from URL parameter
      const urlParams = new URLSearchParams(window.location.search);
      const categoryId = urlParams.get('c') || 'all';
      
      const categoryHeader = document.getElementById('category-header');
      const gamesGrid = document.getElementById('games-grid');

      function getCategoryName(category) {
        if (typeof I18n === 'undefined') return category.name;
        const lang = I18n.getLanguage();
        if (lang === 'en' && category.nameEn) return category.nameEn;
        const keyBased = I18n.t(`categories.${category.id}`, null);
        if (keyBased) return keyBased;
        return category.name;
      }

      function getCategoryDescription(category) {
        if (typeof I18n === 'undefined') return category.description || '';
        const lang = I18n.getLanguage();
        if (lang === 'en' && category.descriptionEn) return category.descriptionEn;
        const keyBased = I18n.t(`categoriesDesc.${category.id}`, null);
        if (keyBased) return keyBased;
        return category.description || '';
      }

      function renderCategoryHeader() {
        if (categoryId !== 'all') {
          const category = App.getCategoryById(categoryId);
          if (category) {
            categoryHeader.innerHTML = `
              <div style="text-align: center;">
                <div style="font-size: 4rem; margin-bottom: var(--spacing-md);">${category.icon}</div>
                <h1>${getCategoryName(category)}</h1>
                <p style="color: var(--color-text-light); font-size: 1.25rem;">${getCategoryDescription(category)}</p>
              </div>
            `;
          } else {
            categoryHeader.innerHTML = `<h1>${I18n.t('games.categoryNotFound', 'Category not found')}</h1>`;
          }
        } else {
          categoryHeader.innerHTML = `<h1>${I18n.t('home.allGames', 'All Games')}</h1>`;
        }
      }
      
      renderCategoryHeader();
      
      // Load games in category
      function renderGames() {
        const games = App.getGamesByCategory(categoryId);
        UI.renderGameCards(gamesGrid, games);
      }
      renderGames();

      document.addEventListener('i18n:loaded', () => {
        renderCategoryHeader();
        renderGames();
      });
      
      // Track page view
      Analytics.trackPageView(`category:${categoryId}`);
    })();
  </script>
</body>
</html>
